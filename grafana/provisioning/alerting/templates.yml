apiVersion: 1

templates:
  - orgId: 1
    name: telegram-monitoring
    template: |
      {{ define "telegram.monitoring.message" -}}
      {{- if gt (len .Alerts.Firing) 0 -}}
      告警中
      {{- else if gt (len .Alerts.Resolved) 0 -}}
      已恢復
      {{- else -}}
      告警更新
      {{- end }}

      {{ range .Alerts -}}
      {{- $summary := index .Annotations "summary" -}}
      {{- $description := index .Annotations "description" -}}
      {{- $reason := index .Annotations "grafana_state_reason" -}}
      {{- $instance := index .Labels "instance" -}}
      {{- $job := index .Labels "job" -}}
      {{- $alertname := index .Labels "alertname" -}}
      {{- $rulename := index .Labels "rulename" -}}
      {{ if $summary -}}
      {{ $summary }}
      {{- else if $instance -}}
      {{ $instance }}
      {{- else if $rulename -}}
      {{ $rulename }}
      {{- else if $alertname -}}
      {{ $alertname }}
      {{- else -}}
      監控告警
      {{- end }}
      {{ if $description -}}
      {{ $description }}
      {{- end }}
      {{ if $instance -}}
      實例: {{ $instance }}
      {{- end }}
      {{ if $job -}}
      Job: {{ $job }}
      {{- end }}
      {{ if and $alertname (ne $alertname "DatasourceNoData") -}}
      Alert: {{ $alertname }}
      {{- end }}
      {{ if $reason -}}
      原因: {{ $reason }}
      {{- end }}
      {{ if .GeneratorURL -}}
      來源: {{ .GeneratorURL }}
      {{- end }}
      {{ end -}}
      {{- end }}
