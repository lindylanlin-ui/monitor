# Grafana-managed alert rules。
# 這份檔案是目前正式生效的告警規則來源。
# 目前架構為「Prometheus 抓 metrics + Grafana Alerting 判斷與通知」，
# 因此 CPU / 記憶體 / 磁碟 / target down / probe failed 等門檻，
# 都應該在這份檔案修改，而不是去改 prometheus/rules/infrastructure-alerts.yml。
#
# 重點提醒：
# 1. `for:` 代表條件要持續多久才真正觸發告警
# 2. `params:` 代表比較門檻值，例如 85、90
# 3. 修改後要重新載入 Grafana，例如：
#    docker compose up -d --force-recreate grafana
apiVersion: 1

groups:
  - orgId: 1
    name: availability
    folder: Infrastructure Alerts
    interval: 30s
    rules:
      - uid: target_down
        title: TargetDown
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: max by (instance, job) (up{job=~"node-exporter|windows-exporter|cadvisor|snmp"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: infra-overview
        panelId: 1
        noDataState: OK
        executionErrorState: Error
        for: 2m
        annotations:
          summary: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}{{ index $v.Labels \"instance\" }} is unreachable{{ else if index $v.Labels \"job\" }}{{ index $v.Labels \"job\" }} target is unreachable{{ else }}Prometheus target is unreachable{{ end }}{{ end }}{{ end }}"
          description: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}Prometheus target {{ index $v.Labels \"instance\" }}{{ else }}A Prometheus target{{ end }}{{ if index $v.Labels \"job\" }} (job={{ index $v.Labels \"job\" }}){{ end }} has been down for more than 2 minutes.{{ end }}{{ end }}"
        labels:
          severity: critical
        isPaused: false
        notification_settings:
          receiver: telegram-monitoring
          group_by:
            - alertname
            - grafana_folder
            - instance
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

