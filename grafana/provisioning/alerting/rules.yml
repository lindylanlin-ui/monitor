              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: infra-overview
        panelId: 2
        noDataState: OK
        executionErrorState: Error
        for: 2m
        annotations:
          summary: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}{{ index $v.Labels \"instance\" }} probe failed{{ else }}Service probe failed{{ end }}{{ end }}{{ end }}"
          description: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}Blackbox probe for {{ index $v.Labels \"instance\" }}{{ else }}A blackbox probe{{ end }} has failed for more than 2 minutes.{{ end }}{{ end }}"
        labels:
          severity: critical
        isPaused: false
        notification_settings:
          receiver: telegram-monitoring
          group_by:
            - alertname
            - grafana_folder
            - instance
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

