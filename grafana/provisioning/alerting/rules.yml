              expr: 100 * (1 - (windows_logical_disk_free_bytes{job="windows-exporter", volume!~"HarddiskVolume.*|_Total"} / windows_logical_disk_size_bytes{job="windows-exporter", volume!~"HarddiskVolume.*|_Total"}))
