                      - 85
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: infra-overview
        panelId: 3
        noDataState: NoData
        executionErrorState: Error
        for: 5m
        annotations:
          summary: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}{{ index $v.Labels \"instance\" }} CPU 使用率過高{{ else }}Linux CPU 使用率過高{{ end }}{{ end }}{{ end }}"
