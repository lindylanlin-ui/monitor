# Grafana-managed alert rules。
# 這份檔案是目前正式生效的告警規則來源。
# 目前架構為「Prometheus 抓 metrics + Grafana Alerting 判斷與通知」，
# 因此 CPU / 記憶體 / 磁碟 / target down / probe failed 等門檻，
# 都應該在這份檔案修改。
#
# 重點提醒：
# 1. `for:` 代表條件要持續多久才真正觸發告警
# 2. `params:` 代表比較門檻值，例如 85、90
# 3. 修改後要重新載入 Grafana，例如：
#    docker compose up -d --force-recreate grafana
apiVersion: 1

deleteRules:
  - orgId: 1
    uid: nvidia_gpu_xid_error

groups:
  - orgId: 1
    name: 可用性
    folder: 基礎設施告警
    interval: 30s
    rules:
      - uid: target_down
        title: 監控目標離線
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: max by (instance, job) (up{job=~"node-exporter|windows-exporter|cadvisor|snmp|smartctl-exporter"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: infra-overview
        panelId: 1
        noDataState: OK
        executionErrorState: Error
        for: 2m
        annotations:
          summary: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}{{ index $v.Labels \"instance\" }} 無法連線{{ else if index $v.Labels \"job\" }}{{ index $v.Labels \"job\" }} target 無法連線{{ else }}Prometheus target 無法連線{{ end }}{{ end }}{{ end }}"
          description: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}Prometheus target {{ index $v.Labels \"instance\" }}{{ else }}Prometheus target{{ end }}{{ if index $v.Labels \"job\" }} (job={{ index $v.Labels \"job\" }}){{ end }} 已連續超過 2 分鐘處於 down 狀態。{{ end }}{{ end }}"
        labels:
          severity: critical
        isPaused: false
        notification_settings:
          receiver: telegram-monitoring
          group_by:
            - alertname
            - grafana_folder
            - instance
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

      - uid: service_probe_failed
        title: 服務探測失敗
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: max by (instance, job) (probe_success{job=~"blackbox-http|blackbox-tcp"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: infra-overview
        panelId: 2
        noDataState: OK
        executionErrorState: Error
        for: 2m
        annotations:
          summary: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}{{ index $v.Labels \"instance\" }} probe 失敗{{ else }}Service probe 失敗{{ end }}{{ end }}{{ end }}"
          description: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}{{ index $v.Labels \"instance\" }} 的 Blackbox probe{{ else }}Blackbox probe{{ end }} 已連續失敗超過 2 分鐘。{{ end }}{{ end }}"
        labels:
          severity: critical
        isPaused: false
        notification_settings:
          receiver: telegram-monitoring
          group_by:
            - alertname
            - grafana_folder
            - instance
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

      - uid: access_point_ping_failed
        title: 無線基地台 Ping 失敗
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: max by (instance, job, role, site) (probe_success{job="blackbox-icmp", role="access-point", service!="study-room-ap-ping"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: infra-overview
        panelId: 8
        noDataState: OK
        executionErrorState: Error
        for: 2m
        annotations:
          summary: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}{{ index $v.Labels \"instance\" }} AP 無法 ping 通{{ else }}Access point 無法 ping 通{{ end }}{{ end }}{{ end }}"
          description: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}{{ index $v.Labels \"instance\" }} 的 ICMP probe{{ else }}Access point 的 ICMP probe{{ end }} 已連續失敗超過 2 分鐘。{{ end }}{{ end }}"
        labels:
          severity: critical
        isPaused: false
        notification_settings:
          receiver: telegram-monitoring
          group_by:
            - alertname
            - grafana_folder
            - instance
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

      - uid: public_web_slow_response
        title: 公開網站回應過慢
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 600, to: 0 }
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 1000 * probe_duration_seconds{job="blackbox-http", role="public-web"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 0, to: 0 }
            model:
              conditions:
                - evaluator: { params: [2000], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
                  type: query
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: website-service-overview
        panelId: 8
        noDataState: OK
        executionErrorState: Error
        for: 5m
        annotations:
          summary: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}{{ index $v.Labels \"instance\" }} 回應過慢{{ else }}公開網站服務回應過慢{{ end }}{{ end }}{{ end }}"
          description: "公開網站服務的 HTTP probe 回應時間已連續 5 分鐘超過 2 秒。"
        labels: { severity: warning }
        isPaused: false
        notification_settings:
          receiver: telegram-monitoring
          group_by: [alertname, grafana_folder, instance]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

      - uid: public_web_tls_certificate_expiring
        title: 公開網站 TLS 憑證即將到期
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 7200, to: 0 }
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: (probe_ssl_earliest_cert_expiry{job="blackbox-http", role="public-web"} - time()) / 86400
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 0, to: 0 }
            model:
              conditions:
                - evaluator: { params: [21], type: lt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
                  type: query
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: website-service-overview
        panelId: 10
        noDataState: OK
        executionErrorState: Error
        for: 1h
        annotations:
          summary: "{{ range $k, $v := $values }}{{ if (match \"B[0-9]+\" $k) }}{{ if index $v.Labels \"instance\" }}{{ index $v.Labels \"instance\" }} TLS 憑證即將到期{{ else }}公開網站服務 TLS 憑證即將到期{{ end }}{{ end }}{{ end }}"
          description: "公開網站服務的 TLS 憑證剩餘天數少於 21 天，請安排更新。"
        labels: { severity: warning }
        isPaused: false
        notification_settings:
          receiver: telegram-monitoring
          group_by: [alertname, grafana_folder, instance]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

