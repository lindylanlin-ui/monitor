          description: "SNMP 裝置有效記憶體使用率（已排除 cache / buffers）連續 10 分鐘高於 90%。"
        labels:
          severity: warning
        isPaused: false
        notification_settings:
          receiver: telegram-monitoring
          group_by: [alertname, grafana_folder, instance]
