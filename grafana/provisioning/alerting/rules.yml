          group_interval: 5m
          repeat_interval: 4h

      - uid: nas_traffic_spike
        title: NAS 網路流量異常尖峰
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 7200
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: ((sum by (instance) (rate(ifHCInOctets{job="snmp", instance="synology-nas", ifDescr=~"eth[0-9]+"}[5m]) * 8) > clamp_min(avg_over_time((sum by (instance) (rate(ifHCInOctets{job="snmp", instance="synology-nas", ifDescr=~"eth[0-9]+"}[5m]) * 8))[1h:5m]) * 3, 200000000)) or (sum by (instance) (rate(ifHCOutOctets{job="snmp", instance="synology-nas", ifDescr=~"eth[0-9]+"}[5m]) * 8) > clamp_min(avg_over_time((sum by (instance) (rate(ifHCOutOctets{job="snmp", instance="synology-nas", ifDescr=~"eth[0-9]+"}[5m]) * 8))[1h:5m]) * 3, 200000000)))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: network-edge-and-nas
        panelId: 3
        noDataState: OK
        executionErrorState: Error
