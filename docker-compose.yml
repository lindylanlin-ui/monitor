services:
  # Prometheus 是整個監控平台的核心，負責定期抓取各 exporter 指標、
  # 套用告警規則，並把時間序列資料保存下來。
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: monitoring-prometheus
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
    # 啟動參數說明：
    # --config.file: Prometheus 主設定檔。
    # --storage.tsdb.path: 指標資料保存路徑。
    # --storage.tsdb.retention.time: 保留多久的歷史資料。
    # --web.enable-lifecycle: 允許之後用 HTTP 重新載入設定。
    # --web.external-url: 對外服務網址，供 UI 與反向代理使用。
    command:
      - >
        exec /bin/prometheus
        --config.file=/etc/prometheus/prometheus.yml
        --storage.tsdb.path=/prometheus
        --storage.tsdb.retention.time=${PROMETHEUS_RETENTION}
        --web.enable-lifecycle
        --web.external-url=${PROMETHEUS_EXTERNAL_URL}
        >> /var/log/project/prometheus.log 2>&1
    logging:
      driver: none
    # 對外開放 Prometheus UI / API。
    ports:
      - "${PROMETHEUS_PORT}:9090"
    depends_on:
      - node-exporter
      - cadvisor
      - blackbox-exporter
      - snmp-exporter
      - smartctl-exporter
    # 掛載設定檔與規則檔，資料本體放到專案內的本機資料夾，
    # 方便你直接在專案目錄下看到與備份，但這些資料夾不會推上 GitHub。
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/file_sd:/etc/prometheus/file_sd:ro
      - ./prometheus/data:/prometheus
      - ./logs:/var/log/project
    networks:
      - monitoring

  # Grafana 提供圖表、dashboard 與 Grafana Alerting。
  # 這裡會透過 provisioning 自動匯入資料來源、面板、Grafana-managed alert rules 與 Telegram contact point。
  # Telegram contact point 會在啟動時寫入 runtime provisioning，避免把敏感資訊直接存進 Git 版本庫。
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: monitoring-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT}:3000"
    # 這些環境變數會在容器第一次啟動時建立初始設定。
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # 讓 Grafana 正確以 /grafana/ 子路徑模式提供頁面與靜態資源。
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: browser
    entrypoint:
      - /bin/sh
      - -c
    command:
      - >
        exec /bin/sh /usr/local/bin/start-grafana-with-secrets.sh
        >> /var/log/project/grafana.log 2>&1
    logging:
      driver: none
    volumes:
      # provisioning-src 放 Git 追蹤的靜態模板，真正提供給 Grafana 讀取的是 runtime 目錄。
      - ./grafana/provisioning:/etc/grafana/provisioning-src:ro
      - ./grafana/runtime:/etc/grafana/provisioning
      - ./grafana/templates:/etc/grafana/templates:ro
      # 先掛載 Grafana 資料目錄，再掛載其 dashboards 子目錄；反過來會讓父目錄覆蓋 JSON dashboard 掛載。
      - ./grafana/data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./logs:/var/log/project
      # Grafana Alerting 的 Telegram secrets 放在 secrets/grafana-alerting。
      - ./secrets:/etc/grafana/secrets:ro
      - ./scripts/start-grafana-with-secrets.sh:/usr/local/bin/start-grafana-with-secrets.sh:ro
    networks:
      - monitoring

  # Node Exporter 用來監控 Linux 主機本身的 CPU、記憶體、磁碟、網路與 systemd 狀態。
  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION}
    container_name: monitoring-node-exporter
    restart: unless-stopped
    pid: host
    entrypoint:
      - /bin/sh
      - -c
    # 這些參數讓容器內的 exporter 可以看到宿主機的 /proc、/sys、rootfs。
    command:
      - >
        exec /bin/node_exporter
        --path.rootfs=/host
        --path.procfs=/host/proc
        --path.sysfs=/host/sys
        --collector.textfile.directory=/var/lib/node_exporter/textfile
        '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/credentials/.+|var/lib/docker/.+)($|/)'
        '--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|mqueue|nsfs|overlay|proc|pstore|securityfs|selinuxfs|squashfs|sysfs|tracefs)$'
        >> /var/log/project/node-exporter.log 2>&1
    logging:
      driver: none
    volumes:
      # 某些 Linux 發行版的根掛載不是 shared/slave，rslave 會導致容器無法啟動。
      # 這裡改成一般唯讀掛載即可滿足 node-exporter 的主機檔案系統讀取需求。
      - /:/host:ro
      # 主機端的 systemd timer 會把 Fail2ban 等自訂 metric 寫到此目錄；
      # node_exporter 僅以唯讀方式讀取，避免容器意外修改主機端輸出。
      - ./node-exporter/textfile:/var/lib/node_exporter/textfile:ro
      - ./logs:/var/log/project
    networks:
      - monitoring

  # cAdvisor 用來抓取 Docker 容器資源使用情況，特別適合觀察多個 docker-compose 專案。
  cadvisor:
    # cAdvisor 官方映像已改用 ghcr.io，且 tag 不帶 v 前綴。
    image: ghcr.io/google/cadvisor:${CADVISOR_VERSION}
    container_name: monitoring-cadvisor
    restart: unless-stopped
    privileged: true
    entrypoint:
      - /bin/sh
      - -c
    command:
      # snap 版 Docker 的 containerd socket 在 /var/run/snap.docker/containerd/containerd.sock。
      # 明確指定可避免 /var/run 掛載下的 /run/containerd 與宿主機其他 runtime 路徑混淆，
      # 導致 cAdvisor 只抓到 systemd cgroup、Grafana 的 Docker dashboard 全部 No data。
      - >
        exec /usr/bin/entrypoint.sh
        --containerd=/var/run/snap.docker/containerd/containerd.sock
        >> /var/log/project/cadvisor.log 2>&1
    logging:
      driver: none
    devices:
      - /dev/kmsg
    # cAdvisor 需要讀取 Docker 與 Linux 核心資訊，因此會掛載多個宿主機目錄。
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      # Docker 的資料目錄依安裝方式不同而異。
      # 一般 apt 安裝常見為 /var/lib/docker，snap 安裝常見為 /var/snap/docker/common/var-lib-docker。
      - ${DOCKER_ROOT_DIR}:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
      - ./logs:/var/log/project
    networks:
      - monitoring

  # Smartctl Exporter 讀取宿主機 HDD、SSD 與 NVMe 的 SMART 資訊。
  # 這包含整體健康狀態、溫度、NVMe 剩餘備援空間、磨損與媒體錯誤。
  # smartctl 需要以 root 權限向磁碟裝置發送查詢，因此僅提供唯讀監控用途。
  smartctl-exporter:
    image: prometheuscommunity/smartctl-exporter:${SMARTCTL_EXPORTER_VERSION}
    container_name: monitoring-smartctl-exporter
    restart: unless-stopped
    privileged: true
    user: root
    logging:
      driver: none
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
    networks:
      - monitoring

  # NVIDIA GPU 監控採用官方 DCGM Exporter。
  # GPU 驅動與 NVIDIA Container Toolkit 必須先可正常執行 nvidia-smi，
  # 因此以 gpu profile 隔離，不影響沒有相容 GPU 的部署。
  # 啟用方式請見 docs/SETUP-GUIDE.md。
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:${DCGM_EXPORTER_VERSION}
    container_name: monitoring-dcgm-exporter
    profiles:
      - gpu
    restart: unless-stopped
    # 此主機的 NVIDIA Container Toolkit 使用 CDI 模式；顯式選用 nvidia
    # runtime 可避免 Compose 的 gpus: all 直接呼叫 NVIDIA hook 而啟動失敗。
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    logging:
      driver: none
    networks:
      - monitoring

  # Blackbox Exporter 用來做 HTTP / TCP 可用性探測，適合檢查網站、API、RDP、SSH 等服務。
  blackbox-exporter:
    image: prom/blackbox-exporter:${BLACKBOX_EXPORTER_VERSION}
    container_name: monitoring-blackbox-exporter
    restart: unless-stopped
    cap_add:
      - CAP_NET_RAW
    entrypoint:
      - /bin/sh
      - -c
    command:
      - >
        exec /bin/blackbox_exporter
        --config.file=/etc/blackbox_exporter/blackbox.yml
        >> /var/log/project/blackbox-exporter.log 2>&1
    logging:
      driver: none
    volumes:
      - ./prometheus/blackbox.yml:/etc/blackbox_exporter/blackbox.yml:ro
      - ./logs:/var/log/project
    networks:
      - monitoring

  # SNMP Exporter 用來監控 NAS、Router、交換器等無法安裝 exporter 的設備。
  snmp-exporter:
    image: prom/snmp-exporter:${SNMP_EXPORTER_VERSION}
    container_name: monitoring-snmp-exporter
    restart: unless-stopped
    # 先把本機驗證檔與模組檔合併成最終 snmp.yml，再啟動 exporter。
    entrypoint:
      - /bin/sh
      - -c
    command:
      - >
        { render-snmp-config.sh;
        exec /bin/snmp_exporter --config.file=/etc/snmp_exporter/snmp.yml; }
        >> /var/log/project/snmp-exporter.log 2>&1
    logging:
      driver: none
    volumes:
      - ./snmp:/etc/snmp-config:ro
      - ./scripts/render-snmp-config.sh:/usr/local/bin/render-snmp-config.sh:ro
      - ./snmp/generated:/etc/snmp_exporter
      - ./logs:/var/log/project
    networks:
      - monitoring

networks:
  # 單獨的 monitoring 網路，讓各服務彼此用服務名稱互通。
  monitoring:
    name: monitoring
