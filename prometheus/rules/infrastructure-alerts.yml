# Prometheus 原生告警規則檔。
# 注意：這份檔案屬於舊版「Prometheus rule_files + Alertmanager」架構，
# 目前 repo 內保留作為歷史參考與查表用途，正式流程已不再載入這份檔案。
# 若未來要重新啟用 Prometheus 原生告警，才需要回頭搭配：
# 1. prometheus/prometheus.yml 內的 rule_files / alerting 設定
# 2. alertmanager/alertmanager.yml
# 3. docker-compose.yml 內的 alertmanager 服務
#
# 目前正式生效的告警規則請改：
# grafana/provisioning/alerting/rules.yml
groups:
  # 可用性告警：主機或服務完全無法抓取時，優先通知。
  - name: availability
    rules:
      - alert: TargetDown
        expr: up{job=~"node-exporter|windows-exporter|cadvisor|snmp"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} is unreachable"
          description: "Prometheus failed to scrape {{ $labels.job }} for more than 2 minutes."

      - alert: ServiceProbeFailed
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} probe failed"
          description: "Blackbox probe for {{ $labels.instance }} has failed for more than 2 minutes."

  # Linux 主機告警：聚焦 CPU、記憶體與根目錄容量。
  - name: linux-hosts
    rules:
      - alert: LinuxCpuHigh
        expr: 100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{job="node-exporter", mode="idle"}[5m]))) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} CPU usage is high"
          description: "Linux CPU utilization stayed above 85% for 5 minutes."

      - alert: LinuxMemoryHigh
        expr: 100 * (1 - (node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"})) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} memory usage is high"
          description: "Linux memory utilization stayed above 90% for 5 minutes."

      - alert: LinuxRootDiskHigh
        expr: 100 * (1 - (node_filesystem_avail_bytes{job="node-exporter", mountpoint="/", fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{job="node-exporter", mountpoint="/", fstype!~"tmpfs|overlay|squashfs"})) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} root disk usage is high"
          description: "Root filesystem utilization stayed above 85% for 10 minutes."

  # Windows 主機告警：聚焦 CPU、記憶體與磁碟空間。
  - name: windows-hosts
    rules:
      - alert: WindowsCpuHigh
        expr: 100 * (1 - avg by (instance) (rate(windows_cpu_time_total{job="windows-exporter", mode="idle"}[5m]))) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} CPU usage is high"
          description: "Windows CPU utilization stayed above 85% for 5 minutes."

      - alert: WindowsMemoryHigh
        expr: 100 * (1 - (windows_memory_physical_free_bytes{job="windows-exporter"} / windows_memory_physical_total_bytes{job="windows-exporter"})) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} memory usage is high"
          description: "Windows memory utilization stayed above 90% for 5 minutes."

      - alert: WindowsDiskHigh
        expr: 100 * (1 - (windows_logical_disk_free_bytes{job="windows-exporter", volume!~"HarddiskVolume.*|_Total"} / windows_logical_disk_size_bytes{job="windows-exporter", volume!~"HarddiskVolume.*|_Total"})) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} disk usage is high"
          description: "Windows disk {{ $labels.volume }} stayed above 85% utilization for 10 minutes."

  # NAS / Router 類設備告警：使用 SNMP 指標判斷 CPU、記憶體與磁碟健康。
  - name: network-edge
    rules:
      - alert: SnmpCpuHigh
        expr: avg by (instance) (hrProcessorLoad{job="snmp"}) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} CPU usage is high"
          description: "SNMP CPU utilization stayed above 85% for 10 minutes."

      - alert: SnmpMemoryHigh
        expr: 100 * (1 - (memAvailReal{job="snmp"} / memTotalReal{job="snmp"})) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} memory usage is high"
          description: "SNMP memory utilization stayed above 90% for 10 minutes."

      - alert: SynologyDiskHealthProblem
        expr: diskHealthStatus{job="snmp"} != 1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} disk {{ $labels.diskID }} health warning"
          description: "Synology reported a non-healthy disk state for disk {{ $labels.diskID }}."
