# 這個檔案列出所有 Windows VM 的 windows_exporter targets。
# 你需要先在每台 Windows VM 安裝 windows_exporter，再把 IP 或主機名填進來。
#
# 主要觀察指標：
# windows_cpu_time_total: CPU 使用率
# windows_os_physical_memory_free_bytes: 可用記憶體
# windows_cs_physical_memory_bytes: 總實體記憶體
# windows_logical_disk_free_bytes / size_bytes: 磁碟使用率
# windows_service_state: 服務執行狀態
- targets: ["win10-vm-01.lan:9182"]
  labels:
    device: win10-vm-01
    role: windows-vm
    site: home

- targets: ["win10-vm-02.lan:9182"]
  labels:
    device: win10-vm-02
    role: windows-vm
    site: home
