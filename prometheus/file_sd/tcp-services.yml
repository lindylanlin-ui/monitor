# 這個檔案列出要做 TCP 探測的服務。
# 只要服務有在指定連接埠上接受 TCP 連線，就會判定成功。
#
# 適合放在這裡的項目：
# SSH、RDP、SMB、資料庫、Message Queue、其他純 TCP 服務。
#
# 主要觀察指標：
# probe_success: 是否能成功連線
# probe_duration_seconds: 建立連線所花的時間
- targets: ["grafana:3000"]
  labels:
    service: grafana-tcp
    role: monitoring-ui

# 在下方加入你的 TCP 探測項目，例如 SSH、RDP、SMB、資料庫或自訂應用程式。
# - targets: ["win10-vm-01.lan:3389"]
#   labels:
#     service: win10-vm-01-rdp
#     role: remote-desktop
